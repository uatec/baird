TVH_URL=http://localhost:9981
TVH_USER=unknown
TVH_PASS=unknown

JELLYFIN_URL=http://localhost:8096
JELLYFIN_USER=unknown
JELLYFIN_PASS=unknown

JELLYSEERR_URL=http://localhost:5055
JELLYSEERR_API_KEY=your-api-key-here

BAIRD_FULLSCREEN=false

# Speech-to-text (voice command support)
# Download a GGML model, e.g. ggml-base.en.bin from:
# https://huggingface.co/ggerganov/whisper.cpp/tree/main
WHISPER_MODEL_PATH=/path/to/ggml-base.en.bin

# Integer value of the Avalonia Key enum that triggers voice-to-text.
# KEY_VOICECOMMAND (Linux evdev 0x246) does NOT map to a known Avalonia Key value;
# it depends on the XKB keymap loaded on the device.
# To find the value: run the app, focus a search box, press the voice button,
# and check the console for "[MainView] Key: ... (NNN)" — use NNN here.
# Leave unset (or 0) to disable voice-to-text.
# VOICE_COMMAND_KEY=0
